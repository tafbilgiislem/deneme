<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SVG Editor</title>

<style>

body{

font-family:Arial;

background:#eee;

padding:20px;

}

#wrap{

display:flex;

gap:20px;

}

#svg{

flex:3;

background:white;

border:1px solid #ccc;

aspect-ratio:16/9;

}

#svg svg{

width:100%;

height:100%;

}

#panel{

flex:1;

background:white;

padding:10px;

border:1px solid #ccc;

max-height:85vh;

overflow:auto;

}

input{

width:100%;

margin:5px 0;

}

button{

width:100%;

margin-top:6px;

}

</style>

</head>

<body>

<h2>SVG EDITOR</h2>

<select id="slide"></select>

<div id="wrap">

<div id="svg"></div>

<div id="panel">

<div id="editor"></div>

<button onclick="save()">SAVE</button>

<button onclick="reload()">RELOAD</button>

</div>

</div>

<script>

/******** CONFIG ********/

const worker="https://githubtoken.tafbilgiislem.workers.dev/";

const key="SVG_SECRET_12345";

const slides=[

"https://raw.githubusercontent.com/tafbilgiislem/ypm/refs/heads/main/slayt.svg",

"SVG_URL2",

"SVG_URL3"

];

/******** STATE ********/

let index=0;

/******** SELECT ********/

slides.forEach((s,i)=>{

let o=document.createElement("option");

o.value=i;

o.text="Slide "+(i+1);

slide.appendChild(o);

});

slide.onchange=()=>{

index=slide.value;

load();

};

/******** LOAD ********/

async function load(){

let url=slides[index]+"?v="+Date.now();

let r=await fetch(url);

let t=await r.text();

svg.innerHTML=t;

let s=document.querySelector("#svg svg");

s.setAttribute("viewBox","0 0 1920 1080");

build();

}

/******** BUILD PANEL ********/

function build(){

editor.innerHTML="";

let texts=document.querySelectorAll("text");

let i=0;

texts.forEach(t=>{

if(!t.id){

t.id="txt"+i;

}

let box=document.createElement("div");

/******** TEXT ********/

let input=document.createElement("input");

input.value=t.textContent;

input.oninput=()=>{

t.textContent=input.value;

};

box.appendChild(input);

/******** SIZE ********/

let size=document.createElement("input");

size.type="number";

size.value=t.getAttribute("font-size")||24;

size.oninput=()=>{

t.setAttribute("font-size",size.value);

t.style.fontSize=size.value+"px";

};

box.appendChild(size);

/******** COLOR ********/

let color=document.createElement("input");

color.type="color";

color.value=getColor(t);

color.oninput=()=>{

t.setAttribute("fill",color.value);

t.style.fill=color.value;

};

box.appendChild(color);

/******** DRAG ********/

drag(t);

editor.appendChild(box);

i++;

});

}

/******** DRAG ********/

function drag(el){

let x,y;

el.onmousedown=e=>{

x=e.clientX-(el.getAttribute("x")||0);

y=e.clientY-(el.getAttribute("y")||0);

window.onmousemove=e2=>{

el.setAttribute("x",e2.clientX-x);

el.setAttribute("y",e2.clientY-y);

};

window.onmouseup=()=>{

window.onmousemove=null;

};

};

}

/******** SAVE ********/

async function save(){

let original=document.querySelector("#svg svg");

let clone=original.cloneNode(true);

let data=clone.outerHTML;

await fetch(worker,{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":key

},

body:JSON.stringify({

svg:data,

slide:index

})

});

setTimeout(load,1500);

alert("saved");

}

/******** RELOAD ********/

function reload(){

load();

}

/******** COLOR HELPER ********/

function getColor(t){

let c=t.getAttribute("fill");

if(c) return c;

let s=getComputedStyle(t).fill;

let r=s.match(/\d+/g);

if(!r) return "#000000";

return "#"+((1<<24)+(r[0]<<16)+(r[1]<<8)+(+r[2])).toString(16).slice(1);

}

/******** START ********/

load();

</script>

</body>

</html>
