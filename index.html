<script>

const workerURL = "https://githubtoken.tafbilgiislem.workers.dev/";
const wsURL = "wss://githubtoken.tafbilgiislem.workers.dev/ws";
const apiKey = "SVG_SECRET_12345";

let ws;
let slideIndex = 0;

const svgBox = document.getElementById("svgBox");
const editor = document.getElementById("editor");

// ================= SAFE INIT =================
window.onload = () => {
  try {
    connectWS();
    loadSlide();
  } catch(e){
    console.error("INIT ERROR:", e);
  }
};

// ================= WS =================
function connectWS(){
  try {
    ws = new WebSocket(wsURL);

    ws.onmessage = (e)=>{
      try {
        const data = JSON.parse(e.data);

        if(data.type === "update" && data.slide == slideIndex){
          applySVG(data.svg);
        }
      } catch(err){
        console.error("WS parse error", err);
      }
    };

  } catch(e){
    console.error("WS ERROR:", e);
  }
}

// ================= APPLY =================
function applySVG(svgText){

  if(!svgBox || !editor) return;

  svgBox.innerHTML = "";
  editor.innerHTML = "";

  svgBox.innerHTML = svgText;

  buildEditor();
  prepareTexts();
}

// ================= LOAD =================
async function loadSlide(){
  try {

    const res = await fetch(workerURL + "?slide=" + slideIndex + "&t=" + Date.now(), {
      cache: "no-store",
      headers: { "x-api-key": apiKey }
    });

    const svg = await res.text();
    applySVG(svg);

  } catch(e){
    console.error("LOAD ERROR:", e);
  }
}

// ================= SAVE =================
async function save(){

  try {

    const svg = svgBox.querySelector("svg")?.outerHTML;

    if(!svg) return;

    await fetch(workerURL, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey
      },
      body: JSON.stringify({ svg, slide: slideIndex })
    });

    if(ws && ws.readyState === 1){
      ws.send(JSON.stringify({
        type: "update",
        slide: slideIndex,
        svg
      }));
    }

  } catch(e){
    console.error("SAVE ERROR:", e);
  }
}

</script>
