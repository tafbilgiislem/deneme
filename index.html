<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Editor</title>

<style>
body{font-family:Arial;background:#eee;padding:20px;}
#wrap{display:flex;gap:20px;}
#svgBox{flex:3;background:white;border:1px solid #ccc;aspect-ratio:16/9;}
#svgBox svg{width:100%;height:100%;}
#editor{flex:1;background:white;padding:10px;border:1px solid #ccc;overflow:auto;}
input{width:100%;margin:5px 0;}
button{width:100%;margin-top:10px;}
</style>
</head>

<body>

<h2>SVG Editor</h2>

<select id="slideSelect"></select>

<div id="wrap">
  <div id="svgBox"></div>

  <div id="editor">
    <button onclick="save()">SAVE</button>
  </div>
</div>

<script>
const workerURL = "https://githubtoken.tafbilgiislem.workers.dev/";
const apiKey = "SVG_SECRET_12345";

let slideIndex = 0;

const svgBox = document.getElementById("svgBox");
const editor = document.getElementById("editor");
const slideSelect = document.getElementById("slideSelect");

// INIT SAFE
window.addEventListener("DOMContentLoaded", () => {

  // slides
  [0,1].forEach((_,i)=>{
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = "Slide " + (i+1);
    slideSelect.appendChild(opt);
  });

  slideSelect.onchange = () => {
    slideIndex = slideSelect.value;
    loadSlide();
  };

  loadSlide();
});

// LOAD
async function loadSlide(){

  const res = await fetch(workerURL + "?slide=" + slideIndex, {
    headers: { "x-api-key": apiKey }
  });

  const svgText = await res.text();

  svgBox.innerHTML = svgText;

  buildEditor();
}

// EDITOR
function buildEditor(){

  const oldInputs = editor.querySelectorAll("input");
  oldInputs.forEach(i => i.remove());

  const texts = svgBox.querySelectorAll("text");

  texts.forEach((t)=>{

    const input = document.createElement("input");
    input.value = t.textContent;

    input.oninput = () => {
      t.textContent = input.value;
    };

    editor.appendChild(input);
  });
}

// SAVE
async function save(){

  const svg = svgBox.querySelector("svg")?.outerHTML;
  if(!svg) return;

  await fetch(workerURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey
    },
    body: JSON.stringify({
      svg,
      slide: slideIndex
    })
  });

  alert("Saved!");
}

</script>

</body>
</html>
