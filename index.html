<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SVG Slide Editor Pro</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:0;
padding:20px;
}

#layout{

display:flex;

gap:20px;

}

#svgBox{

flex:3;

background:white;

border:1px solid #ccc;

aspect-ratio:16/9;

max-width:1920px;

}

#svgBox svg{

width:100%;

height:100%;

}

#panel{

flex:1;

background:white;

padding:10px;

border:1px solid #ccc;

max-height:85vh;

overflow:auto;

}

input{

width:100%;

margin:4px 0;

padding:4px;

}

button{

margin-top:6px;

padding:6px;

width:100%;

}

.activeText{

stroke:red;

stroke-width:1;

}

</style>

</head>

<body>

<h2>SVG SLIDE EDITOR PRO</h2>

<select id="slideSelect"></select>

<div id="layout">

<div id="svgBox"></div>

<div id="panel">

<div id="inputs"></div>

<button onclick="save()">SAVE</button>

<button onclick="undo()">UNDO</button>

</div>

</div>

<script>

/******** CONFIG ********/

const workerURL="https://githubtoken.tafbilgiislem.workers.dev/";

const apiKey="SVG_SECRET_12345";

const slides=[

"https://raw.githubusercontent.com/tafbilgiislem/ypm/refs/heads/main/slayt.svg",

"https://raw.githubusercontent.com/tafbilgiislem/ypm/refs/heads/main/info.svg",

"SVG_URL3"

];

/******** STATE ********/

let slideIndex=0;

let history=[];

let textInputs=[];

/******** SLIDE SELECT ********/

slides.forEach((s,i)=>{

let o=document.createElement("option");

o.value=i;

o.text="Slide "+(i+1);

slideSelect.appendChild(o);

});

slideSelect.onchange=()=>{

slideIndex=slideSelect.value;

load();

};

/******** LOAD SVG ********/

async function load(){

let url=slides[slideIndex]+"?"+Date.now();

let res=await fetch(url);

let svg=await res.text();

svgBox.innerHTML=svg;

let s=document.querySelector("#svgBox svg");

s.setAttribute("viewBox","0 0 1920 1080");

s.setAttribute("preserveAspectRatio","xMidYMid meet");

prepareTexts();

buildPanel();

history.push(s.outerHTML);

}

/******** TEXT SETUP ********/

function prepareTexts(){

let texts=document.querySelectorAll("text");

let i=0;

texts.forEach(t=>{

if(!t.id){

t.id="t"+i;

}

enableDrag(t);

t.onclick=()=>{

texts.forEach(x=>x.classList.remove("activeText"));

t.classList.add("activeText");

};

i++;

});

}

/******** PANEL ********/

function buildPanel(){

inputs.innerHTML="";

textInputs=[];

let texts=document.querySelectorAll("text");

texts.forEach(t=>{

let box=document.createElement("div");

let txt=document.createElement("input");

txt.value=t.textContent;

txt.oninput=()=>{

t.textContent=txt.value;

autoSave();

};

box.appendChild(txt);

let size=document.createElement("input");

size.type="number";

size.value=parseInt(getComputedStyle(t).fontSize);

size.oninput=()=>{

t.setAttribute("font-size",size.value);

t.style.fontSize=size.value+"px";

autoSave();

};

box.appendChild(size);

let color=document.createElement("input");

color.type="color";

color.value=rgb2hex(getComputedStyle(t).fill);

color.oninput=()=>{

t.setAttribute("fill",color.value);

t.style.fill=color.value;

autoSave();

};

box.appendChild(color);

inputs.appendChild(box);

textInputs.push(txt);

});

}

/******** DRAG ********/

function enableDrag(t){

let ox,oy;

t.onmousedown=e=>{

ox=e.clientX-(t.getAttribute("x")||0);

oy=e.clientY-(t.getAttribute("y")||0);

window.onmousemove=e2=>{

t.setAttribute("x",e2.clientX-ox);

t.setAttribute("y",e2.clientY-oy);

autoSave();

};

window.onmouseup=()=>{

window.onmousemove=null;

};

};

}

/******** UNDO ********/

function undo(){

if(history.length>1){

history.pop();

svgBox.innerHTML=history[history.length-1];

prepareTexts();

buildPanel();

}

}

/******** SAVE ********/

async function save(){

let svg=document.querySelector("svg").outerHTML;

await fetch(workerURL,{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":apiKey

},

body:JSON.stringify({

svg:svg,

slide:slideIndex

})

});

setTimeout(load,1000);

}

/******** AUTO SAVE ********/

let saveTimer;

function autoSave(){

clearTimeout(saveTimer);

saveTimer=setTimeout(()=>{

history.push(document.querySelector("svg").outerHTML);

},700);

}

/******** POLLING ********/

setInterval(()=>{

load();

},8000);

/******** HELPERS ********/

function rgb2hex(rgb){

let r=rgb.match(/\d+/g);

if(!r)return "#000000";

return "#"+((1<<24)+(r[0]<<16)+(r[1]<<8)+(+r[2])).toString(16).slice(1);

}

/******** START ********/

load();

</script>

</body>

</html>
