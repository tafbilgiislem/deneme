<script>

window.addEventListener("DOMContentLoaded", () => {

const workerURL = "https://githubtoken.tafbilgiislem.workers.dev/";
const apiKey = "SVG_SECRET_12345";

let slideIndex = 0;
let history = [];

const svgBox = document.getElementById("svgBox");
const editor = document.getElementById("editor");

// ================= LOAD =================
async function loadSlide(){

  const res = await fetch(workerURL + "?slide=" + slideIndex + "&t=" + Date.now(), {
    cache: "no-store",
    headers: { "x-api-key": apiKey }
  });

  const svgText = await res.text();

  svgBox.innerHTML = svgText;

  const svg = svgBox.querySelector("svg");
  if(!svg) return;

  svg.setAttribute("viewBox","0 0 1920 1080");

  buildEditor();
  prepareTexts();

  history = [svg.outerHTML];
}

// ================= EDITOR =================
function buildEditor(){
  editor.innerHTML = "";

  const texts = svgBox.querySelectorAll("text");

  texts.forEach((t,i)=>{

    const input = document.createElement("input");
    input.value = t.textContent;
    input.oninput = () => t.textContent = input.value;

    const size = document.createElement("input");
    size.type = "number";
    size.value = parseInt(t.getAttribute("font-size") || 16);
    size.oninput = () => t.setAttribute("font-size", size.value);

    const color = document.createElement("input");
    color.type = "color";
    color.value = "#000000";
    color.oninput = () => t.setAttribute("fill", color.value);

    editor.appendChild(input);
    editor.appendChild(size);
    editor.appendChild(color);
  });
}

// ================= SAVE =================
async function save(){

  const svg = svgBox.querySelector("svg")?.outerHTML;
  if(!svg) return;

  await fetch(workerURL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey
    },
    body: JSON.stringify({ svg, slide: slideIndex })
  });

  setTimeout(loadSlide, 300);
}

// START
loadSlide();

});
</script>
