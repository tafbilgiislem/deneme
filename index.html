<script>

const workerURL = "https://githubtoken.tafbilgiislem.workers.dev/";
const wsURL = "wss://githubtoken.tafbilgiislem.workers.dev/ws";

let ws;
let slideIndex = 0;

// ================= CONNECT WS =================
function connectWS(){
  ws = new WebSocket(wsURL);

  ws.onmessage = (e)=>{
    const data = JSON.parse(e.data);

    if(data.type === "update"){
      if(data.slide == slideIndex){
        applySVG(data.svg);
      }
    }
  };
}

connectWS();

// ================= APPLY SVG =================
function applySVG(svgText){
  svgBox.innerHTML = "";
  editor.innerHTML = "";

  svgBox.innerHTML = svgText;

  buildEditor();
  prepareTexts();
}

// ================= LOAD =================
async function loadSlide(){

  const res = await fetch(workerURL + "?slide=" + slideIndex + "&t=" + Date.now(), {
    cache: "no-store",
    headers: { "x-api-key": apiKey }
  });

  const svg = await res.text();
  applySVG(svg);
}

// ================= SAVE + BROADCAST =================
async function save(){

  const svg = svgBox.querySelector("svg").outerHTML;

  await fetch(workerURL, {
    method: "POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey
    },
    body: JSON.stringify({ svg, slide: slideIndex })
  });

  // 🔥 REALTIME BROADCAST
  ws.send(JSON.stringify({
    type: "update",
    slide: slideIndex,
    svg
  }));
}

</script>
