<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Editor PRO</title>

<style>
body{font-family:Arial;background:#eee;padding:20px;}
#wrap{display:flex;gap:20px;}
#svgBox{flex:3;background:white;border:1px solid #ccc;aspect-ratio:16/9;}
#svgBox svg{width:100%;height:100%;}
#panel{flex:1;background:white;padding:10px;border:1px solid #ccc;max-height:85vh;overflow:auto;}
input{width:100%;margin:5px 0;}
button{width:100%;margin-top:6px;}
</style>
</head>

<body>

<h2>Figma-Style SVG Editor</h2>

<select id="slideSelect"></select>

<div id="wrap">
  <div id="svgBox"></div>
  <div id="panel">
    <div id="editor"></div>
    <button onclick="save()">SAVE</button>
  </div>
</div>

<script>

const workerURL = "https://githubtoken.tafbilgiislem.workers.dev/";
const apiKey = "SVG_SECRET_12345";

// ================= STATE =================
const state = {
  slideIndex: 0,
  svg: "",
  texts: []
};

// ================= INIT SAFE =================
window.addEventListener("DOMContentLoaded", () => {

  const svgBox = document.getElementById("svgBox");
  const editor = document.getElementById("editor");
  const slideSelect = document.getElementById("slideSelect");

  // slides
  [0,1].forEach((_,i)=>{
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = "Slide " + (i+1);
    slideSelect.appendChild(opt);
  });

  slideSelect.onchange = () => {
    state.slideIndex = slideSelect.value;
    loadSlide();
  };

  // ================= LOAD =================
  async function loadSlide(){

    const res = await fetch(workerURL + "?slide=" + state.slideIndex + "&t=" + Date.now(), {
      cache: "no-store",
      headers: { "x-api-key": apiKey }
    });

    const svgText = await res.text();

    state.svg = svgText;

    render();
  }

  // ================= RENDER (SINGLE SOURCE OF TRUTH) =================
  function render(){

    svgBox.innerHTML = state.svg;

    const svg = svgBox.querySelector("svg");
    if(!svg) return;

    svg.setAttribute("viewBox","0 0 1920 1080");

    buildEditor();
    enableDrag();
  }

  // ================= EDITOR =================
  function buildEditor(){

    editor.innerHTML = "";

    const texts = svgBox.querySelectorAll("text");

    texts.forEach((t,i)=>{

      const wrap = document.createElement("div");

      const input = document.createElement("input");
      input.value = t.textContent;

      input.oninput = () => {
        t.textContent = input.value;
      };

      const size = document.createElement("input");
      size.type = "number";
      size.value = t.getAttribute("font-size") || 16;

      size.oninput = () => {
        t.setAttribute("font-size", size.value);
      };

      const color = document.createElement("input");
      color.type = "color";
      color.value = "#000000";

      color.oninput = () => {
        t.setAttribute("fill", color.value);
      };

      wrap.appendChild(input);
      wrap.appendChild(size);
      wrap.appendChild(color);

      editor.appendChild(wrap);
    });
  }

  // ================= DRAG =================
  function enableDrag(){
    const texts = svgBox.querySelectorAll("text");

    texts.forEach(t=>{
      let ox, oy;

      t.onmousedown = e=>{
        ox = e.clientX - (parseFloat(t.getAttribute("x")) || 0);
        oy = e.clientY - (parseFloat(t.getAttribute("y")) || 0);

        const move = e2=>{
          t.setAttribute("x", e2.clientX - ox);
          t.setAttribute("y", e2.clientY - oy);
        };

        const up = ()=>{
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", up);
        };

        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
      };
    });
  }

  // ================= SAVE =================
  async function save(){

    const svg = svgBox.querySelector("svg")?.outerHTML;
    if(!svg) return;

    await fetch(workerURL, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey
      },
      body: JSON.stringify({
        svg,
        slide: state.slideIndex
      })
    });

    state.svg = svg;
  }

  // expose
  window.loadSlide = loadSlide;
  window.save = save;

  // start
  loadSlide();

});

</script>

</body>
</html>
