<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login + SVG Slide Editor</title>
<style>
body{font-family:Arial;background:#eee;padding:20px;margin:0;}
#loginWrap,#editorWrap{max-width:1920px;margin:auto;}
#loginWrap{display:flex;flex-direction:column;width:300px;}
#loginWrap input{margin:5px 0;padding:5px;}
#loginWrap button{padding:5px;margin-top:5px;}
#wrap{display:flex;gap:20px;margin-top:20px;}
#svgBox{flex:3;background:white;border:1px solid #ccc;aspect-ratio:16/9;}
#svgBox svg{width:100%;height:100%;}
#panel{flex:1;background:white;padding:10px;border:1px solid #ccc;max-height:85vh;overflow:auto;}
input{width:100%;margin:5px 0;}
button{width:100%;margin-top:6px;}
.activeText{stroke:red;stroke-width:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
<h2>Login</h2>
<input id="user" placeholder="Kullanıcı Adı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
<p id="msg" style="color:red"></p>
</div>

<!-- EDITOR -->
<div id="editorWrap" style="display:none">
<h2>SVG Slide Editor Instant Save</h2>
<select id="slideSelect"></select>
<div id="wrap">
  <div id="svgBox"></div>
  <div id="panel">
    <div id="editor"></div>
    <button onclick="save()">SAVE</button>
    <button onclick="undo()">UNDO</button>
  </div>
</div>
</div>

<script>
// CONFIG
const workerURL="https://githubtoken.tafbilgiislem.workers.dev/"; // Worker URL (Cloudflare)
const apiKey="SVG_SECRET_12345";    // Worker API Key
const slides=[
"https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg",
"https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slide2.svg",
"https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slide3.svg"
];

// LOGIN
const credentials = [
  {user:"admin",pass:"1234"},
  {user:"editor",pass:"5678"}
];
function login(){
  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;
  const ok=credentials.find(c=>c.user===u && c.pass===p);
  if(ok){
    sessionStorage.setItem("token",btoa(u+":"+p));
    document.getElementById("loginWrap").style.display="none";
    document.getElementById("editorWrap").style.display="block";
    initEditor();
  }else{
    document.getElementById("msg").textContent="Kullanıcı adı veya şifre yanlış!";
  }
}

// AUTO LOGIN
window.onload=()=>{
  const t=sessionStorage.getItem("token");
  if(t){
    document.getElementById("loginWrap").style.display="none";
    document.getElementById("editorWrap").style.display="block";
    initEditor();
  }
};

// EDITOR STATE
let slideIndex=0;
let history=[];

// INIT EDITOR
function initEditor(){
  slides.forEach((s,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.text="Slide "+(i+1);
    slideSelect.appendChild(opt);
  });
  slideSelect.onchange=()=>{slideIndex=slideSelect.value; loadSlide();};
  loadSlide();
}

// LOAD SLIDE
async function loadSlide(){
  const url=slides[slideIndex]+"?v="+Date.now();
  const res=await fetch(url);
  const svgText=await res.text();
  svgBox.innerHTML=svgText;
  const s=svgBox.querySelector("svg");
  if(!s) return;
  s.setAttribute("viewBox","0 0 1920 1080");
  buildEditor();
  prepareTexts();
  history=[s.outerHTML];
}

// BUILD PANEL
function buildEditor(){
  editor.innerHTML="";
  const texts=svgBox.querySelectorAll("text");
  texts.forEach((t,i)=>{
    if(!t.id) t.id="txt"+i;
    const div=document.createElement("div");

    // Text
    const input=document.createElement("input");
    input.value=t.textContent;
    input.oninput=()=>{ t.textContent=input.value; };
    div.appendChild(input);

    // Font size
    const size=document.createElement("input");
    size.type="number";
    size.value=parseInt(getComputedStyle(t).fontSize);
    size.oninput=()=>{ t.setAttribute("font-size",size.value); t.style.fontSize=size.value+"px"; };
    div.appendChild(size);

    // Color
    const color=document.createElement("input");
    color.type="color";
    color.value=getColor(t);
    color.oninput=()=>{ t.setAttribute("fill",color.value); t.style.fill=color.value; };
    div.appendChild(color);

    editor.appendChild(div);
  });
}

// DRAG
function prepareTexts(){
  const texts=svgBox.querySelectorAll("text");
  texts.forEach(t=>{
    let ox,oy;
    t.onmousedown=e=>{
      ox=e.clientX-(t.getAttribute("x")||0);
      oy=e.clientY-(t.getAttribute("y")||0);
      const move=e2=>{
        t.setAttribute("x",e2.clientX-ox);
        t.setAttribute("y",e2.clientY-oy);
      };
      const up=()=>{window.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up);}
      window.addEventListener("mousemove",move);
      window.addEventListener("mouseup",up);
    };
  });
}

// UNDO
function undo(){
  if(history.length>1){
    history.pop();
    svgBox.innerHTML=history[history.length-1];
    buildEditor();
    prepareTexts();
  }
}

// SAVE (POST fix)
async function save(){
  const token=sessionStorage.getItem("token");
  if(!token){alert("Yetkisiz!"); return;}
  const svg=svgBox.querySelector("svg").outerHTML;
  try{
    await fetch(workerURL,{
      method:"POST",                 // 🔑 POST method
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "x-user-token":token
      },
      body:JSON.stringify({svg:svg,slide:slideIndex})
    });
    alert("SVG kaydedildi! Editor live olarak güncel.");
    history=[svg];
  }catch(e){alert("Save error: "+e);}
}

// COLOR HELPER
function getColor(t){
  let c=t.getAttribute("fill");
  if(c) return c;
  const s=getComputedStyle(t).fill;
  const r=s.match(/\d+/g);
  if(!r) return "#000000";
  return "#"+((1<<24)+(r[0]<<16)+(r[1]<<8)+(+r[2])).toString(16).slice(1);
}
</script>
</body>
</html>
